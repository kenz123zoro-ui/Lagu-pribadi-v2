<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1db954">
<title>MusikKu Pro</title>
<link rel="manifest" href="manifest.json">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root { --bg:#121212; --card:#181818; --hover:#282828; --text:#fff; --sub:#b3b3b3; --green:#1db954; }
* { transition: all 0.2s ease; box-sizing:border-box; }
body { margin:0; background:linear-gradient(180deg, #1a1a1a 0%, var(--bg) 400px); color:var(--text); font-family:Arial; padding-bottom:160px; min-height:100vh; }
header { padding:20px; font-size:24px; font-weight:bold; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:rgba(18,18,18,0.9); backdrop-filter:blur(10px); z-index:10; }
.user-badge { font-size:12px; background:#333; padding:6px 12px; border-radius:15px; cursor:pointer; }
.btn-add { background:var(--green); border:none; color:#000; padding:8px 16px; border-radius:20px; font-weight:bold; cursor:pointer; font-size:13px; margin-left:8px; }
#search { width:calc(100% - 40px); margin:0 20px 15px; padding:12px 16px; border-radius:25px; border:none; background:#2a2a2a; color:var(--text); }
.filter-tabs { display:flex; gap:10px; padding:0 20px 15px; overflow-x:auto; }
.tab { padding:8px 16px; background:#2a2a2a; border-radius:20px; cursor:pointer; font-size:13px; white-space:nowrap; }
.tab.active { background:var(--green); color:#000; font-weight:bold; }
.song { display:flex; align-items:center; padding:12px; border-radius:8px; cursor:pointer; margin:0 20px 8px; background:var(--card); }
.song:hover { background:var(--hover); transform:translateX(4px); }
.song.active { background:linear-gradient(90deg, #1db95422, var(--hover)); border-left:3px solid var(--green); }
.song img { width:50px; height:50px; border-radius:6px; background:#333; margin-right:12px; object-fit:cover; }
.song-info { flex:1; overflow:hidden; }
.song-title { font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.song-artist { font-size:12px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.song-btns { display:flex; gap:8px; }
.btn-icon { background:none; border:none; font-size:20px; cursor:pointer; color:var(--sub); }
.btn-icon.active { color:var(--green); }
.player { position:fixed; bottom:0; left:0; right:0; background:rgba(24,24,24,0.98); backdrop-filter:blur(15px); padding:12px 20px; border-top:1px solid #282828; z-index:20; }
#radioStatus { display:none; background:var(--green); color:#000; padding:6px 12px; border-radius:15px; font-size:11px; font-weight:bold; margin-bottom:10px; text-align:center; }
.now-playing-bar { display:flex; align-items:center; margin-bottom:10px; gap:10px; }
.now-playing-bar img { width:40px; height:40px; border-radius:4px; background:#333; animation:rotate 20s linear infinite; animation-play-state:paused; object-fit:cover; }
.now-playing-bar.playing img { animation-play-state:running; }
@keyframes rotate { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.now-text { flex:1; overflow:hidden; }
.now-title { font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.now-artist { font-size:12px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.progress { width:100%; height:4px; background:#535353; border-radius:2px; cursor:pointer; margin-bottom:12px; position:relative; }
.progress-bar { height:100%; background:var(--green); width:0%; border-radius:2px; }
.time-info { display:flex; justify-content:space-between; font-size:11px; color:var(--sub); margin-bottom:8px; }
.controls { display:flex; align-items:center; justify-content:center; gap:15px; }
.controls button { background:none; border:none; color:var(--text); font-size:22px; cursor:pointer; }
.controls button:active { transform:scale(0.9); }
.controls button.main { background:var(--text); color:var(--bg); width:48px; height:48px; border-radius:50%; font-size:20px; }
.controls button.active { color:var(--green); }
.extra-controls { display:flex; justify-content:center; gap:15px; margin-top:8px; }
.extra-controls button { background:none; border:none; color:var(--sub); font-size:16px; cursor:pointer; }
audio { display:none; }
.loading { text-align:center; color:var(--sub); padding:40px; }
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:30; }
.modal.show { display:flex; }
.modal-content { background:var(--card); padding:30px; border-radius:12px; width:90%; max-width:400px; max-height:80vh; overflow-y:auto; }
.modal-content h2 { margin:0 0 20px; }
.modal-content input,.modal-content textarea { width:100%; padding:12px; margin-bottom:15px; border:none; border-radius:8px; background:#2a2a2a; color:var(--text); font-family:Arial; }
.modal-content textarea { min-height:120px; resize:vertical; }
.modal-content button { width:100%; padding:12px; background:var(--green); border:none; border-radius:8px; color:#000; font-weight:bold; cursor:pointer; margin-top:10px; }
.modal-content button.cancel { background:#333; color:var(--text); }
.modal-content button.secondary { background:#2a2a2a; color:var(--text); }
.offline-badge { background:#ff6b00; color:#fff; font-size:10px; padding:2px 6px; border-radius:10px; margin-left:5px; }
.lyrics-container { position:fixed; bottom:160px; left:20px; right:20px; background:rgba(24,24,0.95); border-radius:12px; padding:15px; max-height:200px; overflow-y:auto; display:none; z-index:15; }
.lyrics-container.show { display:block; }
.lyrics-line { color:var(--sub); padding:5px 0; font-size:14px; text-align:center; transition:all 0.3s; }
.lyrics-line.active { color:var(--text); font-size:16px; font-weight:bold; }
.eq-controls { display:flex; gap:10px; margin-top:10px; }
.eq-btn { flex:1; padding:8px; background:#2a2a2a; border:none; border-radius:6px; color:var(--text); font-size:12px; }
.eq-btn.active { background:var(--green); color:#000; }
.share-code { background:#2a; padding:12px; border-radius:8px; word-break:break-all; font-family:monospace; font-size:12px; margin:10px 0; }
#playModeStatus { padding:0 20px 10px; color:var(--sub); font-size:11px; text-align:center; }
</style>
</head>
<body>

<header>
  <span id="userName" onclick="showLoginModal()">👤 Guest</span>
  <div>
    <button class="btn-add" onclick="showShareModal()">🔗 Share</button>
    <button class="btn-add" onclick="showAddModal()">+ Tambah</button>
  </div>
</header>

<input type="text" id="search" placeholder="Cari lagu, artis...">
<div id="playModeStatus">Mode: <span id="modeText">Berurutan</span></div>

<div class="filter-tabs">
  <div class="tab active" onclick="setFilter('all')">Semua</div>
  <div class="tab" onclick="setFilter('offline')">📥 Offline</div>
  <div class="tab" onclick="setFilter('fav')">⭐ Favorite</div>
  <div class="tab" onclick="setFilter('recs')">✨ For You</div>
</div>

<div id="playlist"></div>

<audio id="audio" preload="metadata" playsinline></audio>

<div class="lyrics-container" id="lyricsContainer">
  <div id="lyricsContent"></div>
</div>

<div class="player">
  <div id="radioStatus">
    📻 <span id="radioStatusText"></span>
    <button onclick="stopRadio()" style="background:none; border:none; color:#000; margin-left:8px; cursor:pointer;">✕</button>
  </div>
  <div class="now-playing-bar" id="nowBar">
    <img id="nowCover" src="data:image/svg+xml,%3Csvg width='40' height='40'%3E%3Crect width='40' height='40' fill='%23333'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23b3b3b3'%3E♪%3C/text%3E%3C/svg%3E">
    <div class="now-text">
      <div class="now-title" id="nowTitle">Belum ada lagu</div>
      <div class="now-artist" id="nowArtist">Tambah lagu dulu</div>
    </div>
  </div>
  <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div class="time-info">
    <span id="currentTime">0:00</span>
    <span id="duration">0:00</span>
  </div>
  <div class="controls">
    <button id="shuffleBtn">🔀</button>
    <button id="prevBtn">⏮</button>
    <button id="playBtn" class="main">▶</button>
    <button id="nextBtn">⏭</button>
    <button id="repeatBtn">🔁</button>
  </div>
  <div class="extra-controls">
    <button onclick="toggleLyrics()">📜 Lirik</button>
    <button onclick="showEQModal()">🎛️ EQ</button>
    <button onclick="showTimerModal()">⏰ Timer</button>
  </div>
</div>

<!-- Modals -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h2>Login MusikKu</h2>
    <button onclick="loginGoogle()">Login dengan Google</button>
    <button class="secondary" onclick="loginEmail()">Login Email</button>
    <button class="secondary" onclick="logout()">Logout / Guest Mode</button>
    <button class="cancel" onclick="hideModal('loginModal')">Tutup</button>
  </div>
</div>

<div class="modal" id="addModal">
  <div class="modal-content">
    <h2>Tambah Lagu</h2>
    <input type="text" id="songUrl" placeholder="URL MP3">
    <input type="text" id="songTitle" placeholder="Judul lagu">
    <input type="text" id="songArtist" placeholder="Artis">
    <input type="text" id="songCover" placeholder="URL cover (opsional)">
    <textarea id="songLyrics" placeholder="Lirik format LRC (opsional)&#10;[00:12.00]Baris pertama&#10;[00:15.50]Baris kedua"></textarea>
    <button onclick="addSong()">Tambah</button>
    <button class="cancel" onclick="hideModal('addModal')">Batal</button>
  </div>
</div>

<div class="modal" id="shareModal">
  <div class="modal-content">
    <h2>Share Playlist</h2>
    <p>Kode playlist kamu:</p>
    <div class="share-code" id="shareCode"></div>
    <button onclick="copyShareCode()">📋 Copy Kode</button>
    <button class="secondary" onclick="showImportModal()">📥 Import Playlist</button>
    <button class="cancel" onclick="hideModal('shareModal')">Tutup</button>
  </div>
</div>

<div class="modal" id="importModal">
  <div class="modal-content">
    <h2>Import Playlist</h2>
    <input type="text" id="importCode" placeholder="Paste kode playlist">
    <button onclick="importPlaylist()">Import</button>
    <button class="cancel" onclick="hideModal('importModal')">Batal</button>
  </div>
</div>

<div class="modal" id="eqModal">
  <div class="modal-content">
    <h2>Equalizer</h2>
    <div class="eq-controls">
      <button class="eq-btn" onclick="setEQ('flat')">Flat</button>
      <button class="eq-btn" onclick="setEQ('bass')">Bass</button>
      <button class="eq-btn" onclick="setEQ('vocal')">Vocal</button>
    </div>
    <button class="cancel" onclick="hideModal('eqModal')">Tutup</button>
  </div>
</div>

<div class="modal" id="timerModal">
  <div class="modal-content">
    <h2>Sleep Timer</h2>
    <button onclick="setTimer(15)">15 Menit</button>
    <button onclick="setTimer(30)">30 Menit</button>
    <button onclick="setTimer(60)">60 Menit</button>
    <button onclick="setTimer(0)" class="secondary">Matikan Timer</button>
    <button class="cancel" onclick="hideModal('timerModal')">Tutup</button>
  </div>
</div>

<script>
// === FIREBASE SETUP ===
// GANTI CONFIG INI DARI FIREBASE CONSOLE
const firebaseConfig = {
  apiKey: "AIzaSyXXXXXXXXXXXXXXXXXXX",
  authDomain: "musikku-pro.firebaseapp.com",
  projectId: "musikku-pro",
  storageBucket: "musikku-pro.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// === USER SYSTEM CLOUD ===
let currentUser = null;
let userId = 'guest';

function getUserKey(key) {
  return `musikku_${userId}_${key}`;
}

function updateUserDisplay() {
  document.getElementById('userName').textContent = currentUser? `👤 ${currentUser.displayName || currentUser.email}` : '👤 Guest';
}

async function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
  } catch(e) {
    alert('Login gagal: ' + e.message);
  }
}

async function loginEmail() {
  const email = prompt('Email:');
  const pass = prompt('Password:');
  if (!email ||!pass) return;
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    if (e.code === 'auth/user-not-found') {
      if (confirm('Akun belum ada. Daftar?')) {
        await auth.createUserWithEmailAndPassword(email, pass);
      }
    } else {
      alert('Error: ' + e.message);
    }
  }
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(async (user) => {
  currentUser = user;
  userId = user? user.uid : 'guest';
  updateUserDisplay();
  await loadUserSongs();
  hideModal('loginModal');
});

// === DATABASE CLOUD ===
async function saveCloudSongs() {
  if (!currentUser) {
    localStorage.setItem(getUserKey('songs'), JSON.stringify(songs.filter(s =>!s.offline)));
    return;
  }
  const songsToSave = songs.map(s => ({
    name: s.name, artist: s.artist, url: s.offline? 'OFFLINE' : s.url,
    cover: s.cover, fav: s.fav, lyrics: s.lyrics || ''
  }));
  await db.collection('users').doc(userId).set({
    songs: songsToSave, listenCount: listenCount, lastUpdate: Date.now()
  });
}

async function loadCloudSongs() {
  if (!currentUser) {
    return JSON.parse(localStorage.getItem(getUserKey('songs')) || '[]');
  }
  const doc = await db.collection('users').doc(userId).get();
  if (doc.exists) {
    const data = doc.data();
    listenCount = data.listenCount || {};
    return data.songs.filter(s => s.url!== 'OFFLINE') || [];
  }
  return [];
}

// === DATABASE OFFLINE IndexedDB ===
let idb;
const DB_NAME = 'MusikKuDB';
const STORE_NAME = 'songs';

function initDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => { idb = request.result; resolve(); };
    request.onupgradeneeded = (e) => {
      idb = e.target.result;
      if (!idb.objectStoreNames.contains(STORE_NAME)) {
        idb.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
      }
    };
  });
}

async function saveOffline(song) {
  const response = await fetch(song.url);
  const blob = await response.blob();
  const tx = idb.transaction(STORE_NAME, 'readwrite');
  const store = tx.objectStore(STORE_NAME);
  song.blob = blob;
  song.offline = true;
  song.url = URL.createObjectURL(blob);
  song.user = userId;
  await store.add(song);
  return song;
}

async function loadOfflineSongs() {
  const tx = idb.transaction(STORE_NAME, 'readonly');
  const store = tx.objectStore(STORE_NAME);
  const request = store.getAll();
  return new Promise((resolve) => {
    request.onsuccess = () => {
      const offlineSongs = request.result
   .filter(s => s.user === userId)
   .map(s => {
          s.url = URL.createObjectURL(s.blob);
          return s;
        });
      resolve(offlineSongs);
    };
  });
}

// === PLAYER STATE ===
let songs = [];
let current = 0;
let isPlaying = false;
let isShuffle = false;
let repeatMode = 0;
let filter = 'all';
let sleepTimer = null;
let currentEQ = 'flat';
let playHistory = JSON.parse(localStorage.getItem('musikku_history') || '[]');
let listenCount = JSON.parse(localStorage.getItem('musikku_listenCount') || '{}');
let radioMode = false;
let radioSeed = null;

const audio = document.getElementById('audio');
let audioCtx = null;
let gainNode = null;
let bassFilter = null;
let trebleFilter = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaElementSource(audio);
    gainNode = audioCtx.createGain();
    bassFilter = audioCtx.createBiquadFilter();
    bassFilter.type = 'lowshelf';
    bassFilter.frequency.value = 320;
    trebleFilter = audioCtx.createBiquadFilter();
    trebleFilter.type = 'highshelf';
    trebleFilter.frequency.value = 3200;
    source.connect(bassFilter);
    bassFilter.connect(trebleFilter);
    trebleFilter.connect(gainNode);
    gainNode.connect(audioCtx.destination);
  }
  audioCtx.resume();
}

function setEQ(type) {
  currentEQ = type;
  document.querySelectorAll('.eq-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (!audioCtx) return;
  if (type === 'bass') {
    bassFilter.gain.value = 8;
    trebleFilter.gain.value = 0;
  } else if (type === 'vocal') {
    bassFilter.gain.value = -3;
    trebleFilter.gain.value = 6;
  } else {
    bassFilter.gain.value = 0;
    trebleFilter.gain.value = 0;
  }
}

// === REKOMENDASI SYSTEM ===
function updateHistory(song) {
  playHistory.unshift({ name: song.name, artist: song.artist, time: Date.now() });
  if (playHistory.length > 50) playHistory.pop();
  listenCount[song.name] = (listenCount[song.name] || 0) + 1;
  localStorage.setItem('musikku_history', JSON.stringify(playHistory));
  localStorage.setItem('musikku_listenCount', JSON.stringify(listenCount));
  if (currentUser) saveCloudSongs();
}

function detectMood(song) {
  const text = (song.name + ' ' + song.artist + ' ' + (song.lyrics || '')).toLowerCase();
  if (text.match(/love|sad|hurt|cry|broken|alone/)) return 'sad';
  if (text.match(/dance|party|energy|fire|pump|wild/)) return 'energetic';
  if (text.match(/chill|calm|peace|dream|night|slow/)) return 'chill';
  return 'normal';
}

function detectGenre(song) {
  const text = (song.name + ' ' + song.artist).toLowerCase();
  if (text.match(/piano|violin|orchestra|classical/)) return 'classical';
  if (text.match(/edm|electro|house|techno|dubstep/)) return 'edm';
  if (text.match(/rock|metal|guitar/)) return 'rock';
  if (text.match(/pop/)) return 'pop';
  if (text.match(/jazz|blues/)) return 'jazz';
  if (text.match(/hiphop|rap|trap/)) return 'hiphop';
  return 'pop';
}

function getRecommendations() {
  if (songs.length < 3) return [];
  const artistCount = {};
  playHistory.forEach(h => {
    artistCount[h.artist] = (artistCount[h.artist] || 0) + 1;
  });
  const favArtist = Object.keys(artistCount).sort((a,b) => artistCount[b] - artistCount[a])[0];
  const moodCount = {}, genreCount = {};
  songs.forEach(s => {
    const count = listenCount[s.name] || 0;
    if (count > 0) {
      const mood = detectMood(s);
      const genre = detectGenre(s);
      moodCount = (moodCount || 0) + count;
      genreCount[genre] = (genreCount[genre] || 0) + count;
    }
  });
  const favMood = Object.keys(moodCount).sort((a,b) => moodCount[b] - moodCount[a])[0];
  const favGenre = Object.keys(genreCount).sort((a,b) => genreCount[b] - genreCount[a])[0];
  let recs = songs.filter(s => {
    const plays = listenCount[s.name] || 0;
    const sameArtist = s.artist === favArtist;
    const sameMood = detectMood(s) === favMood;
    const sameGenre = detectGenre(s) === favGenre;
    return plays < 3 && (sameArtist || sameMood || sameGenre);
  });
  recs = recs.map(s => {
    let score = 0;
    if (s.artist === favArtist) score += 5;
    if (detectMood(s) === favMood) score += 3;
    if (detectGenre(s) === favGenre) score += 2;
    if (s.fav) score += 2;
    score += Math.random() * 2;
    return {...s, score };
  });
  recs.sort((a, b) => b.score - a.score);
  return recs.slice(0, 10);
}

// === RADIO MODE ===
function startRadio(type, seed) {
  radioMode = true;
  radioSeed = { type, value: seed };
  document.getElementById('radioStatus').style.display = 'block';
  document.getElementById('radioStatusText').textContent =
    type === 'artist'? `Radio: ${seed}` : `Radio: Mirip "${seed}"`;
  playNextRadio();
}

function stopRadio() {
  radioMode = false;
  radioSeed = null;
  document.getElementById('radioStatus').style.display = 'none';
}

function playNextRadio() {
  if (!radioMode ||!radioSeed) return;
  let candidates = [];
  if (radioSeed.type === 'artist') {
    candidates = songs.filter(s => {
      const plays = listenCount[s.name] || 0;
      return plays < 5 && (s.artist === radioSeed.value || detectGenre(s) === detectGenre({artist: radioSeed.value}));
    });
  } else {
    const seedSong = songs.find(s => s.name === radioSeed.value);
    if (!seedSong) return;
    const seedMood = detectMood(seedSong);
    const seedGenre = detectGenre(seedSong);
    candidates = songs.filter(s => {
      const plays = listenCount[s.name] || 0;
      return plays < 5 && s.name!== seedSong.name &&
             (detectMood(s) === seedMood || detectGenre(s) === seedGenre || s.artist === seedSong.artist);
    });
  }
  if (Math.random() < 0.3) {
    const discover = songs.filter(s => (listenCount[s.name] || 0) === 0);
    if (discover.length > 0) candidates = [...candidates,...discover];
  }
  if (candidates.length === 0) {
    candidates = songs.filter(s => s.name!== songs[current].name);
  }
  candidates = candidates.map(s => {
    let score = Math.random() * 3;
    if (s.artist === radioSeed.value) score += 5;
    if ((listenCount[s.name] || 0) === 0) score += 2;
    return {...s, score };
  });
  candidates.sort((a,b) => b.score - a.score);
  const nextSong = candidates[0];
  if (nextSong) {
    const nextIndex = songs.indexOf(nextSong);
    playIndex(nextIndex);
  }
}

// === LYRICS SYSTEM ===
let currentLyrics = [];
let lyricsEnabled = false;

function parseLRC(lrc) {
  if (!lrc) return [];
  const lines = lrc.split('\n');
  const parsed = [];
  lines.forEach(line => {
    const match = line.match(/\[(\d{2}):(\d{2})\.(\d{2})\](.*)/);
    if (match) {
      const min = parseInt(match[1]);
      const sec = parseInt(match[2]);
      const ms = parseInt(match[3]);
      const time = min * 60 + sec + ms / 100;
      const text = match[4].trim();
      if (text) parsed.push({ time, text });
    }
  });
  return parsed;
}

function updateLyrics() {
  if (!lyricsEnabled || currentLyrics.length === 0) return;
  const time = audio.currentTime;
  let activeIndex = -1;
  for (let i = 0; i < currentLyrics.length; i++) {
    if (time >= currentLyrics[i].time) activeIndex = i;
    else break;
  }
  let html = '';
  currentLyrics.forEach((line, i) => {
    html += `<div class="lyrics-line ${i === activeIndex? 'active' : ''}">${line.text}</div>`;
  });
  document.getElementById('lyricsContent').innerHTML = html;
  if (activeIndex >= 0) {
    const activeEl = document.querySelector('.lyrics-line.active');
    if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function toggleLyrics() {
  lyricsEnabled =!lyricsEnabled;
  document.getElementById('lyricsContainer').classList.toggle('show', lyricsEnabled);
}

function importPlaylist() {
  try {
    const code = document.getElementById('importCode').value;
    const imported = JSON.parse(atob(code));
    songs = [...songs,...imported.filter(s => s.url!== 'OFFLINE')];
    saveCloudSongs();
    renderPlaylist();
    hideModal('importModal');
    alert('Playlist berhasil diimport!');
  } catch(e) {
    alert('Kode tidak valid');
  }
}

async function addSong() {
  const url = document.getElementById('songUrl').value;
  const title = document.getElementById('songTitle').value || 'Unknown';
  const artist = document.getElementById('songArtist').value || 'Unknown';
  const cover = document.getElementById('songCover').value || 'icon-192.png';
  const lyrics = document.getElementById('songLyrics').value;
  if (!url) return alert('URL wajib diisi');
  const song = { name: title, artist, url, cover, fav: false, offline: false, lyrics, user: userId };
  songs.push(song);
  await saveCloudSongs();
  renderPlaylist();
  hideModal('addModal');
  document.getElementById('songUrl').value = '';
  document.getElementById('songTitle').value = '';
  document.getElementById('songArtist').value = '';
  document.getElementById('songCover').value = '';
  document.getElementById('songLyrics').value = '';
}

  if (songs[i].offline) return;
  try {
    const saved = await saveOffline({...songs[i]});
    songs[i] = saved;
    renderPlaylist();
    alert('Berhasil download offline!');
  } catch(e) {
    alert('Gagal download: ' + e.message);
  }
}
